# ==============================================================================
# setup-upwarden (v2 CORE)  —  the published, customer-facing GitHub Action for
# Upwarden CI package-registry auth. The Upwarden equivalent of
# google-github-actions/auth: it turns a hand-rolled "mint OIDC + curl the
# exchange + write the registry credential file" dance into a two-line `uses:`.
#
#   - uses: upwarden-io/setup-upwarden@v2
#     with:
#       tool: pnpm             # npm|pnpm|yarn|yarn-classic|pip|uv|poetry|
#                              # maven|gradle|cargo|go|nuget|bundler|none
#       # mode: keyless        # keyless (default) | keyed | static
#       # tenant-vk: ${{ secrets.UPWARDEN_TENANT_VK }}   # keyed/static only
#
# v2 vs v1
#   * `tool` replaces `ecosystem`: one input names the concrete package MANAGER,
#     from which the CORE derives the wire PROTOCOL, the default registry HOST,
#     and the base URL. Many tools collapse onto a handful of protocols.
#   * Writing the per-tool credential file is delegated to an external, per-tool
#     writer script (writers/<tool>.sh) dispatched as the final step. The CORE
#     only resolves config, acquires the credential, and hands both to the
#     writer via the environment. `tool: none` is an exchange-only escape hatch
#     (acquire a credential, skip all file writing).
#
# THREE AUTH MODES (labels used exactly as the platform defines them):
#   keyless (DEFAULT) — mint a GitHub OIDC JWT (aud=upwarden.io), POST it to the
#                       exchange with NO vk_; the tenant is derived purely from
#                       the signed repository_owner_id via verified_org_ownership.
#                       Returns a short-lived (~6h) vke_ registry credential.
#   keyed             — same exchange, but the vk_ is sent as the tenant selector
#                       (Authorization: Bearer). Requires tenant-vk + id-token:write.
#   static            — a long-lived vk_ used DIRECTLY as the registry credential
#                       (HTTP Basic / Bearer). No OIDC, no /exchange. Works on ANY
#                       CI. Requires tenant-vk.
#
# SETTLED PER-UNIT MODEL:
#   WHO (the security boundary) is SIGNED — the OIDC trust-binding
#   (repository_id / repository_owner_id) or the vk_. WHICH UNIT is self-declared,
#   NON-security METADATA: the per-package unit NAME, read at runtime from that
#   package's own manifest and passed as the x-upwarden-ci-unit header. Safe
#   because minting the token already requires repo control (worst case =
#   self-mislabel inside an owned repo, never cross-tenant).
#
# SECURITY POSTURE (retained from v1, unchanged):
#   aggressive ::add-mask:: on every secret the moment it is known; least
#   privilege (raw credential NEVER surfaces as an action output — only via
#   GITHUB_ENV for the writer); fail-closed on any non-200 from the exchange;
#   registry host is pinned (per-tool default, explicit override only).
# ==============================================================================
name: "Setup Upwarden"
description: "Keyless OIDC auth for CI — every dependency fetch authenticated, attributed, and policy-enforced, in two lines (npm/pip/maven/cargo/go/nuget/bundler)."
author: "Upwarden"

branding:
  icon: "shield"
  color: "green"

inputs:
  tool:
    description: >-
      Package manager to configure. One of: npm | pnpm | yarn | yarn-classic |
      pip | uv | poetry | maven | gradle | cargo | go | nuget | bundler | none.
      The CORE derives the wire protocol, default registry host and URL from
      this. Use 'none' as an exchange-only escape hatch (acquire a credential,
      write no files).
    required: true
  mode:
    description: >-
      Auth mode. 'keyless' (default) — OIDC JWT exchanged with NO vk_; tenant
      from verified org ownership. 'keyed' — OIDC JWT exchanged WITH a vk_
      selector -> vke_. 'static' — vk_ used directly as the registry credential
      (no OIDC).
    required: false
    default: "keyless"
  tenant-vk:
    description: >-
      The Upwarden tenant vk_ key. Store as a secret; never inline it. REQUIRED
      for 'keyed' and 'static'; OMIT for 'keyless'. In 'static' it IS the
      registry credential; in 'keyed' it is the tenant selector sent as
      Authorization: Bearer on the exchange.
    required: false
    default: ""
  unit:
    description: >-
      The per-package unit NAME (self-declared, non-security METADATA; sent as
      the x-upwarden-ci-unit header). Omit to auto-discover from the manifest in
      'working-directory' (package.json .name / pyproject.toml name /
      pom.xml <artifactId> / Cargo.toml name / go.mod module).
    required: false
    default: ""
  registry-host:
    description: >-
      Registry/proxy host override. When omitted, defaults per tool:
      npm.pkg.upwarden.io, pypi.pkg.upwarden.io, maven.pkg.upwarden.io,
      crates.pkg.upwarden.io, go.pkg.upwarden.io, nuget.pkg.upwarden.io,
      gems.pkg.upwarden.io. The exchange endpoint is served on the SAME host at
      /api/v1/ci/exchange.
    required: false
    default: ""
  working-directory:
    description: >-
      Directory whose manifest is read to auto-discover the unit name (when
      'unit' is omitted), and the directory the writer targets. Defaults to the
      job's working directory.
    required: false
    default: "."
  audience:
    description: >-
      OIDC audience. MUST be upwarden.io — the verifier pins this and rejects any
      other value with bad_audience. Only used in keyed / keyless.
    required: false
    default: "upwarden.io"

outputs:
  credential-id:
    description: >-
      Public id of the credential (safe to log). For keyed/keyless this is the
      minted vke_ credential_id (correlate against ci_token_mints); for static it
      is a stable fingerprint of the vk_. Empty if auth did not complete.
    value: ${{ steps.auth.outputs.credential-id }}
  registry-host:
    description: "The registry host that was configured (resolved default if not supplied)."
    value: ${{ steps.resolve.outputs.registry-host }}
  registry-url:
    description: "The fully-resolved registry base URL the tool was pointed at."
    value: ${{ steps.resolve.outputs.registry-url }}
  expires-at:
    description: >-
      ISO-8601 UTC expiry of the credential (keyed/keyless vke_ only; empty for
      static, which is long-lived).
    value: ${{ steps.auth.outputs.expires-at }}
  mode:
    description: "The auth mode used (keyless | keyed | static)."
    value: ${{ steps.resolve.outputs.mode }}
  unit:
    description: "The resolved unit NAME (supplied or auto-discovered; may be empty)."
    value: ${{ steps.resolve.outputs.unit }}

runs:
  using: composite
  steps:
    # ------------------------------------------------------------------------
    # 1. RESOLVE — derive protocol + host + URL from `tool`, validate mode, and
    #    resolve the self-declared unit NAME. No secrets, no network. Everything
    #    downstream (auth, export, writer dispatch) reads these outputs.
    #
    #    tool -> protocol / default host / base URL   (registry-host overrides host)
    #      npm|pnpm|yarn|yarn-classic -> npm    -> npm.pkg.upwarden.io    -> https://<host>/
    #      pip|uv|poetry              -> pypi   -> pypi.pkg.upwarden.io   -> https://<host>/simple/
    #      maven|gradle               -> maven  -> maven.pkg.upwarden.io  -> https://<host>/maven2
    #      cargo                      -> crates -> crates.pkg.upwarden.io -> https://<host>/
    #      go                         -> go     -> go.pkg.upwarden.io     -> https://<host>
    #      nuget                      -> nuget  -> nuget.pkg.upwarden.io  -> https://<host>/v3/index.json
    #      bundler                    -> gems   -> gems.pkg.upwarden.io   -> https://<host>
    #      none                       -> (exchange-only; no registry URL, no writer)
    # ------------------------------------------------------------------------
    - id: resolve
      shell: bash
      env:
        IN_TOOL: ${{ inputs.tool }}
        IN_MODE: ${{ inputs.mode }}
        IN_TENANT_VK: ${{ inputs.tenant-vk }}
        IN_REGISTRY_HOST: ${{ inputs.registry-host }}
        IN_UNIT: ${{ inputs.unit }}
        IN_WORKDIR: ${{ inputs.working-directory }}
      run: |
        set -uo pipefail

        tool="${IN_TOOL}"

        # --- tool -> protocol + default host + URL template -------------------
        # url_tmpl uses {H} as the host placeholder so the override slots in
        # cleanly after the host is resolved.
        case "${tool}" in
          npm|pnpm|yarn|yarn-classic) protocol="npm";    def_host="npm.pkg.upwarden.io";    url_tmpl="https://{H}/" ;;
          pip|uv|poetry)              protocol="pypi";   def_host="pypi.pkg.upwarden.io";   url_tmpl="https://{H}/simple/" ;;
          maven|gradle)               protocol="maven";  def_host="maven.pkg.upwarden.io";  url_tmpl="https://{H}/maven2" ;;
          cargo)                      protocol="crates"; def_host="crates.pkg.upwarden.io"; url_tmpl="https://{H}/" ;;
          go)                         protocol="go";     def_host="go.pkg.upwarden.io";     url_tmpl="https://{H}" ;;
          nuget)                      protocol="nuget";  def_host="nuget.pkg.upwarden.io";  url_tmpl="https://{H}/v3/index.json" ;;
          bundler)                    protocol="gems";   def_host="gems.pkg.upwarden.io";   url_tmpl="https://{H}" ;;
          none)                       protocol="";       def_host="";                       url_tmpl="" ;;
          *) echo "::error::[setup-upwarden] unsupported tool '${tool}' (expected one of: npm pnpm yarn yarn-classic pip uv poetry maven gradle cargo go nuget bundler none)"; exit 1 ;;
        esac

        # --- resolve host + URL (registry-host input overrides the default) ---
        # For `tool: none` there is no registry, but the exchange still needs a
        # host: honour registry-host if given, else fall back to the npm proxy
        # host — every *.pkg.upwarden.io host fronts the same /api/v1/ci/exchange.
        host="${IN_REGISTRY_HOST}"
        if [ -z "${host}" ]; then
          if [ -n "${def_host}" ]; then host="${def_host}"; else host="npm.pkg.upwarden.io"; fi
        fi
        host="${host#https://}"; host="${host#http://}"; host="${host%/}"

        if [ -n "${url_tmpl}" ]; then
          registry_url="${url_tmpl/\{H\}/${host}}"
        else
          registry_url=""   # tool: none — nothing to point a tool at
        fi

        # --- validate mode ----------------------------------------------------
        mode="${IN_MODE:-keyless}"
        case "${mode}" in
          keyless|keyed|static) : ;;
          *) echo "::error::[setup-upwarden] invalid mode '${mode}' (expected: keyless | keyed | static)"; exit 1 ;;
        esac
        # tenant-vk requirement is mode-dependent (fail-closed, surfaced early).
        if { [ "${mode}" = "keyed" ] || [ "${mode}" = "static" ]; } && [ -z "${IN_TENANT_VK}" ]; then
          echo "::error::[setup-upwarden] mode=${mode} requires 'tenant-vk' (store it as a secret). For no-key auth use mode=keyless."
          exit 1
        fi

        # --- resolve the unit NAME (self-declared metadata) -------------------
        # Read from the manifest in working-directory unless supplied explicitly.
        unit="${IN_UNIT}"
        workdir="${IN_WORKDIR:-.}"
        if [ -z "${unit}" ] && [ "${tool}" != "none" ]; then
          case "${protocol}" in
            npm)
              if [ -f "${workdir}/package.json" ]; then
                unit="$( (cd "${workdir}" && node -p "require('./package.json').name") 2>/dev/null || true)"
              fi ;;
            pypi)
              if [ -f "${workdir}/pyproject.toml" ]; then
                # Handle both PEP 621 [project].name and legacy [tool.poetry].name.
                unit="$(python3 -c 'import tomllib,sys; d=tomllib.load(open(sys.argv[1],"rb")); print((d.get("project") or {}).get("name") or (d.get("tool",{}).get("poetry") or {}).get("name") or "")' "${workdir}/pyproject.toml" 2>/dev/null || true)"
              fi ;;
            maven)
              if [ -f "${workdir}/pom.xml" ]; then
                unit="$(python3 -c 'import sys,xml.etree.ElementTree as ET; ns={"m":"http://maven.apache.org/POM/4.0.0"}; r=ET.parse(sys.argv[1]).getroot(); a=r.find("m:artifactId",ns); print(a.text.strip() if a is not None else "")' "${workdir}/pom.xml" 2>/dev/null || true)"
              fi ;;
            crates)
              if [ -f "${workdir}/Cargo.toml" ]; then
                unit="$(python3 -c 'import tomllib,sys; d=tomllib.load(open(sys.argv[1],"rb")); print((d.get("package") or {}).get("name") or "")' "${workdir}/Cargo.toml" 2>/dev/null || true)"
              fi ;;
            go)
              if [ -f "${workdir}/go.mod" ]; then
                unit="$(awk '/^module /{print $2; exit}' "${workdir}/go.mod" 2>/dev/null || true)"
              fi ;;
            *) : ;;  # nuget / gems: no cheap universal manifest key — supply 'unit' explicitly.
          esac
          if [ -n "${unit}" ]; then
            echo "[setup-upwarden] unit auto-discovered from manifest: ${unit}"
          else
            echo "::warning::[setup-upwarden] could not auto-discover a unit name from ${workdir} — proceeding with an empty unit label (attribution metadata only)."
          fi
        fi

        echo "[setup-upwarden] tool=${tool} protocol=${protocol:-<none>} mode=${mode} host=${host} url=${registry_url:-<none>} unit=${unit:-<none>}"

        {
          echo "tool=${tool}"
          echo "protocol=${protocol}"
          echo "mode=${mode}"
          echo "registry-host=${host}"
          echo "registry-url=${registry_url}"
          echo "unit=${unit}"
          echo "working-directory=${workdir}"
        } >> "${GITHUB_OUTPUT}"

    # ========================================================================
    # 2. AUTH — acquire the registry credential. ISOLATED ON PURPOSE.
    #    This is the ONE step that produces a secret. The coming
    #    "vke_ -> raw OIDC JWT" change is confined here: it becomes a small edit
    #    to the keyless/keyed branch below (stop parsing .credential out of the
    #    exchange; emit the minted JWT / forwarded token instead). Nothing else
    #    in this action needs to move.
    #
    #      keyless -> mint OIDC (aud=upwarden.io), POST /exchange with NO vk_
    #      keyed   -> mint OIDC, POST /exchange WITH vk_ as the tenant selector
    #      static  -> vk_ IS the credential (no OIDC, no network)
    #    Fail closed on any non-200. The credential is emitted as a masked step
    #    output ONLY (consumed by the export step) — never an action output.
    # ========================================================================
    - id: auth
      shell: bash
      env:
        MODE: ${{ steps.resolve.outputs.mode }}
        PROTOCOL: ${{ steps.resolve.outputs.protocol }}
        EXCHANGE_HOST: ${{ steps.resolve.outputs.registry-host }}
        UNIT: ${{ steps.resolve.outputs.unit }}
        IN_TENANT_VK: ${{ inputs.tenant-vk }}
        IN_AUDIENCE: ${{ inputs.audience }}
      run: |
        set -uo pipefail

        mode="${MODE}"
        protocol="${PROTOCOL}"
        host="${EXCHANGE_HOST}"
        unit="${UNIT}"

        # Defensively mask the vk_ up front (secrets.* via with: are masked, but a
        # literal input is not — never let it surface under set -x).
        if [ -n "${IN_TENANT_VK}" ]; then echo "::add-mask::${IN_TENANT_VK}"; fi

        credential=""
        credential_id=""
        expires_at=""

        if [ "${mode}" = "static" ]; then
          # ---- static: the vk_ IS the registry credential (no OIDC) ----------
          credential="${IN_TENANT_VK}"
          # Safe, public correlation id: a short fingerprint of the vk_ (never the
          # key itself). Static creds carry no server-minted credential_id.
          credential_id="vk-$(printf '%s' "${IN_TENANT_VK}" | sha256sum | cut -c1-12)"
          echo "[setup-upwarden] static mode — using vk_ directly as the registry credential."
        else
          # ---- keyed / keyless: mint OIDC, exchange -> short-lived vke_ -------
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::[setup-upwarden] mode=${mode} needs a GitHub OIDC token — add 'permissions: id-token: write' to the job."
            exit 1
          fi

          audience="${IN_AUDIENCE:-upwarden.io}"
          echo "[setup-upwarden] minting GitHub OIDC token (audience=${audience})"
          oidc_token="$(curl -fsS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${audience}" \
            | jq -r '.value')"
          if [ -z "${oidc_token:-}" ] || [ "${oidc_token}" = "null" ]; then
            echo "::error::[setup-upwarden] OIDC mint returned empty — check id-token:write and egress to GitHub."
            exit 1
          fi
          echo "::add-mask::${oidc_token}"

          url="https://${host}/api/v1/ci/exchange"
          echo "[setup-upwarden] exchanging at ${url} (mode=${mode}, unit=${unit:-<none>})"

          # Header set:
          #   x-upwarden-ci-oidc : the GitHub-signed JWT (proves WHO).
          #   Authorization      : Bearer <vk_> — ONLY in keyed (tenant selector).
          #   x-upwarden-ci-unit : self-declared unit NAME (non-security metadata).
          hdr_args=(-H "x-upwarden-ci-oidc: ${oidc_token}")
          if [ "${mode}" = "keyed" ]; then
            hdr_args+=(-H "Authorization: Bearer ${IN_TENANT_VK}")
          fi
          if [ -n "${unit}" ]; then
            hdr_args+=(-H "x-upwarden-ci-unit: ${unit}")
          fi

          # Body carries protocol (as `ecosystem`, for exchange back-compat) + the
          # unit label, so attribution is correct whether the engine reads the
          # header or the body channel.
          body_json="$(jq -nc --arg u "${unit}" --arg e "${protocol}" \
            '(if $e=="" then {} else {ecosystem:$e} end) + (if $u=="" then {} else {unit:$u} end)')"

          body_file="$(mktemp)"; trap 'rm -f "${body_file}"' EXIT
          http_status="$(curl -sS -o "${body_file}" -w '%{http_code}' \
            -X POST \
            -H "Content-Type: application/json" \
            "${hdr_args[@]}" \
            --data "${body_json}" \
            "${url}" || echo '000')"

          if [ "${http_status}" != "200" ]; then
            reason="$(jq -r '.reason // .error // "unknown"' < "${body_file}" 2>/dev/null || echo unknown)"
            if [ "${http_status}" = "403" ] && [ "${reason}" = "no_trust_binding" ]; then
              echo "::error::[setup-upwarden] 403 no_trust_binding — the OIDC token verified but no active oidc_trust_binding authorises this (issuer, sub, repository_id) for the tenant. An operator must provision one before the exchange will mint."
            else
              echo "::error::[setup-upwarden] exchange failed — HTTP ${http_status}, reason=${reason}."
            fi
            exit 1
          fi

          # 200 body carries the SECRET vke_ — parse + mask, never echo it.
          # Field-name tolerance: internal exchange returns `.credential`; some
          # proxy builds return `.token` / `.vke`.
          credential="$(jq -r '.credential // .token // .vke // empty' < "${body_file}")"
          credential_id="$(jq -r '.credential_id // .credentialId // empty' < "${body_file}")"
          expires_at="$(jq -r '.expires_at // .expiresAt // empty' < "${body_file}")"
          if [ -z "${credential}" ]; then
            echo "::error::[setup-upwarden] exchange returned 200 but no credential in the response."
            exit 1
          fi
          echo "[setup-upwarden] OK — minted run-scoped vke_ (credential_id=${credential_id:-<none>}, expires_at=${expires_at:-<none>})"
        fi

        # Mask, then write the credential STRAIGHT to the job env (GITHUB_ENV).
        # The raw credential is NEVER a step output nor an action output: a step
        # output persists to the runner's output file and workflow-run state — a
        # broader, longer-lived surface than the per-job env. Only non-secret
        # metadata (credential-id, expires-at) becomes an output.
        # Delimiter form (not KEY=value) so an opaque credential that ever
        # contains a newline cannot inject further env assignments.
        echo "::add-mask::${credential}"
        {
          echo "UPWARDEN_CREDENTIAL<<__UPW_CRED_EOF__"
          echo "${credential}"
          echo "__UPW_CRED_EOF__"
        } >> "${GITHUB_ENV}"
        {
          echo "credential-id=${credential_id}"
          echo "expires-at=${expires_at}"
        } >> "${GITHUB_OUTPUT}"

    # ------------------------------------------------------------------------
    # 3. EXPORT — publish the resolved NON-SECRET config to GITHUB_ENV so the
    #    per-tool writer (and the user's install/publish steps) can consume it.
    #    The credential itself was already written to GITHUB_ENV by the `auth`
    #    step above; this step never touches the secret.
    # ------------------------------------------------------------------------
    - id: export
      shell: bash
      env:
        REGISTRY_HOST: ${{ steps.resolve.outputs.registry-host }}
        REGISTRY_URL: ${{ steps.resolve.outputs.registry-url }}
        TOOL: ${{ steps.resolve.outputs.tool }}
        UNIT: ${{ steps.resolve.outputs.unit }}
        WORKDIR: ${{ steps.resolve.outputs.working-directory }}
      run: |
        set -uo pipefail
        {
          echo "UPWARDEN_REGISTRY_HOST=${REGISTRY_HOST}"
          echo "UPWARDEN_REGISTRY_URL=${REGISTRY_URL}"
          echo "UPWARDEN_TOOL=${TOOL}"
          echo "UPWARDEN_UNIT=${UNIT}"
          echo "UPWARDEN_WORKING_DIRECTORY=${WORKDIR}"
        } >> "${GITHUB_ENV}"
        echo "[setup-upwarden] exported UPWARDEN_* to the job environment."

    # ------------------------------------------------------------------------
    # 4. WRITE — dispatch to the per-tool writer script, which materialises the
    #    tool-native credential file (.npmrc / pip.conf / settings.xml / config
    #    .toml / nuget.config / bundler config / ...). Writers read the
    #    UPWARDEN_* env exported above. SKIPPED entirely for `tool: none` — the
    #    exchange-only escape hatch stops after producing the credential.
    # ------------------------------------------------------------------------
    - id: write
      if: ${{ inputs.tool != 'none' }}
      shell: bash
      env:
        # Use the whitelisted value from `resolve` (validated by its case
        # statement), passed via env — never interpolate raw `inputs.tool`
        # into the shell body.
        ACTION_PATH: ${{ github.action_path }}
        TOOL: ${{ steps.resolve.outputs.tool }}
      run: bash "${ACTION_PATH}/writers/${TOOL}.sh"
